; PlatformIO Project Configuration for ESP32 K-Line Bridge
; Build with: pio run -e wemos_d1_mini
; Upload with: pio run -e wemos_d1_mini -t upload
; Monitor with: pio device monitor -e wemos_d1_mini

[platformio]
default_envs = wemos_d1_mini
src_dir = src
lib_dir = lib
test_dir = test
boards_dir = boards
data_dir = data

; ===================================================================
; Wemos D1 Mini ESP32 (ESP32-WROOM-32, CH9102F USB-C)
; K-Line: UART2 on GPIO16(RX)/GPIO17(TX) via ISO9141 Click (L9637D)
; ===================================================================
[env:wemos_d1_mini]
platform = espressif32 @ ^6.0.0
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_rts = 0
monitor_dtr = 0

; Upload settings
upload_protocol = esptool
upload_speed = 921600
upload_port = COM10
upload_resetmethod = default

; Build options
build_type = release
build_flags = 
    -D CORE_DEBUG_LEVEL=0
    -D ARDUINO_USB_MODE=0
    -D ARDUINO_USB_CDC_ON_BOOT=0
    -D ARDUINO_LOOP_STACK_SIZE=8192
    -D ESP32_KLINE_VERSION=1.0.0
    -D KLINE_BAUDRATE=10400
    -D KLINE_RX_PIN=16
    -D KLINE_TX_PIN=17
    -D ISO9141_EN_PIN=4
    -D DEALER_PIN=12
    -D LED_PIN=2
    -D WIFI_SSID="GSX-R1000_ECU"
    -D WIFI_PASSWORD="suzuki2004"
    -D BLUETOOTH_NAME="GSX-R1000_ECU"
    -DBT_ENABLED=1
    -DBOARD_WEMOS_D1_MINI=1

; Link ESP32 Bluetooth libraries (must use += syntax for append)
; Note: "build_flags +=" is an append operation, not a config error

; Partition table for 4MB flash
board_build.partitions = default_4MB.csv
board_build.flash_mode = qio
board_build.f_cpu = 240000000L

; Libraries
lib_deps = 
    bblanchon/ArduinoJson@^7.0.4
    me-no-dev/ESPAsyncWebServer@^3.0.0
    paulstoffregen/OneWire@^2.3.7
    milesburton/DallasTemperature@^3.9.1

; Enable Bluetooth in menuconfig
board_build.menuconfig = 
    CONFIG_BT_ENABLED=y
    CONFIG_BTDM_CONTROLLER_MODE_BTDM=y
    CONFIG_BT_BTU_TASK_STACK_SIZE=4096
    CONFIG_BT_BTC_TASK_STACK_SIZE=4096
    CONFIG_BTDM_CTRL_BTDM_COHAB=y
    CONFIG_BTDM_CTRL_MODE_BTDM=y

; Library compatibility
lib_ldf_mode = chain+
lib_compat_mode = strict

; ===================================================================
; ESP32 DevKitC / Node-32S (generic, fallback)
; ===================================================================
[env:esp32dev]
extends = wemos_d1_mini
upload_port = COM5
build_flags = 
    ${env:wemos_d1_mini.build_flags}
    -DBOARD_ESP32DEV=1

; ===================================================================
; ESP32-S3 (if using newer module)
; ===================================================================
[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
upload_speed = 921600
build_flags = ${env:esp32dev.build_flags}
lib_deps = ${env:esp32dev.lib_deps}
board_build.partitions = default_8MB.csv

; ===================================================================
; ESP32-C3 (if using C3 module)
; ===================================================================
[env:esp32c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200
upload_protocol = esptool
upload_speed = 921600
build_flags = ${env:esp32dev.build_flags}
lib_deps = ${env:esp32dev.lib_deps}
board_build.partitions = default_4MB.csv

; ===================================================================
; Debug build (for development)
; ===================================================================
[env:esp32dev_debug]
extends = esp32dev
build_type = debug
build_flags = 
    ${env:esp32dev.build_flags}
    -D CORE_DEBUG_LEVEL=5
    -D DEBUG_ESP_KLINE=1
    -Og
    -g3
    -ggdb

; ===================================================================
; Release build (optimized)
; ===================================================================
[env:esp32dev_release]
extends = esp32dev
build_type = release
build_flags = 
    ${env:esp32dev.build_flags}
    -Os
    -flto
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections

; ===================================================================
; Custom partition table for more SPIFFS space
; ===================================================================
[env:esp32dev_bigfs]
extends = esp32dev
board_build.partitions = custom_bigfs.csv

; ===================================================================
; PlatformIO Tool Configurations (moved to top)
; ===================================================================

; ===================================================================
; Advanced: PlatformIO CLI Aliases
; ===================================================================
; Run these from terminal in project root:
; pio run -e esp32dev              # Build
; pio run -e esp32dev -t upload    # Upload
; pio device monitor -e esp32dev   # Monitor
; pio run -e esp32dev -t clean     # Clean
; pio run -e esp32dev -t size      # Size info
; pio run -e esp32dev_debug        # Debug build
; pio run -e esp32dev_release      # Release build