[platformio]
default_envs = esp32_bt

; ─── ESP32 + Bluetooth SPP (wireless to Python dashboard) ───
[env:esp32_bt]
platform = espressif32
board = esp32dev
framework = arduino
board_build.partitions = default_ffat.csv
monitor_speed = 115200
lib_deps =
    https://github.com/aster94/Keyword-Protocol-2000.git
    # Only needed for standalone build (SDSProtocol.h is local)

; ─── ESP32 + TFT Display (standalone gauge cluster) ───
[env:esp32_tft]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI@^2.5.0
lib_ignore =
    Keyword-Protocol-2000  ; not needed when using local SDSProtocol

; ─── ESP32 + WiFi Web Dashboard (phone browser access) ───
[env:esp32_web]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^6.21.3

; ─── Arduino Nano (fallback, no BT/WiFi) ───
[env:nano]
platform = atmelavr
board = nano
framework = arduino
lib_deps =
    https://github.com/aster94/Keyword-Protocol-2000.git

; ─── ESP32 + All-in-One (BT + TFT + WiFi) ───
[env:esp32_all]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps =
    bodmer/TFT_eSPI@^2.5.0
    links2004/WebSockets@^2.4.1
    bblanchon/ArduinoJson@^6.21.3
